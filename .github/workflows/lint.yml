name: Lint

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # Pinned to v4.2.2 (11bd71901bbe5b1630ceea73d27597364c9af683) — supply-chain fix (TES-38 / CR2).
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run lint
        run: make lint
