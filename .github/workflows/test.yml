name: Test

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  bats:
    name: bats-core Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run bats tests
        run: |
          TEST_FILES=$(find tests -name '*.bats' 2>/dev/null || true)
          if [[ -n "${TEST_FILES}" ]]; then
            ./tests/bats/bin/bats ${TEST_FILES}
          else
            echo "No .bats test files found."
          fi
