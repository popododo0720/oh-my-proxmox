name: Test

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  bats:
    name: bats-core Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # Pinned to v4.2.2 (11bd71901bbe5b1630ceea73d27597364c9af683) — supply-chain fix (TES-38 / CR2).
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive

      - name: Run tests
        run: make test
