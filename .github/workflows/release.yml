name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dev dependencies
        run: make deps

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract the section for this tag from CHANGELOG.md
          NOTES=$(awk "/^## \[${TAG#v}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null || echo "")
          if [[ -z "${NOTES}" ]]; then
            NOTES="Release ${TAG}"
          fi
          # Save as multiline output
          {
            echo "notes<<EOF"
            echo "${NOTES}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "oh-my-proxmox ${{ github.ref_name }}"
          body: |
            ${{ steps.changelog.outputs.notes }}

            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/popododo0720/oh-my-proxmox/main/install.sh | bash
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
